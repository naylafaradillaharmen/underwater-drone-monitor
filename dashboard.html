<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSense · Dashboard Drone + Kontrol</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a1f2e 0%, #0b2b3a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Efek gelembung */
        .bubble {
            position: absolute;
            background: rgba(78, 205, 196, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* Container utama - full height tanpa scroll */
        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        /* Header dengan logout menyatu */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 12px 25px 12px 35px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-left i {
            font-size: 2.2rem;
            color: #4ecdc4;
            background: rgba(78, 205, 196, 0.2);
            padding: 12px;
            border-radius: 50%;
        }

        .header-left h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .header-left h1 span {
            color: #4ecdc4;
            font-size: 1rem;
            margin-left: 10px;
            font-weight: 400;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .user-badge i {
            color: #4ecdc4;
            font-size: 1.2rem;
        }

        .user-badge span {
            color: white;
            font-weight: 500;
        }

        .logout-btn {
            background: rgba(255, 82, 82, 0.15);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff6b6b;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #ff5252;
            color: white;
            border-color: #ff5252;
            transform: scale(1.05);
        }

        /* Grid kartu - 3 kolom penuh */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 15px 0;
            flex: 0 0 auto;
        }

        /* Kartu */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 20px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(78, 205, 196, 0.5);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 10px;
        }

        .card-header i {
            font-size: 2rem;
            padding: 8px;
            border-radius: 20px;
        }

        .card-tds .card-header i { 
            color: #ff9f1c; 
            background: rgba(255, 159, 28, 0.2); 
        }
        .card-ec .card-header i { 
            color: #b980f0; 
            background: rgba(185, 128, 240, 0.2); 
        }
        .card-temp .card-header i { 
            color: #4ecdc4; 
            background: rgba(78, 205, 196, 0.2); 
        }

        .card-header h2 {
            font-size: 1.6rem;
            font-weight: 600;
        }

        .main-value {
            text-align: center;
            margin: 5px 0;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .value-number {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
        }

        .card-tds .value-number { color: #ff9f1c; text-shadow: 0 0 30px rgba(255, 159, 28, 0.5); }
        .card-ec .value-number { color: #b980f0; text-shadow: 0 0 30px rgba(185, 128, 240, 0.5); }
        .card-temp .value-number { color: #4ecdc4; text-shadow: 0 0 30px rgba(78, 205, 196, 0.5); }

        .value-unit {
            font-size: 1.3rem;
            color: #a8dadc;
            margin-left: 5px;
            font-weight: 500;
        }

        .value-label {
            text-align: center;
            color: #a8dadc;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px 0;
        }

        .card-footer {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #a8dadc;
            font-size: 0.8rem;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.8rem;
        }

        /* Panel Kontrol Drone */
        .control-panel {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(78, 205, 196, 0.3);
            border-radius: 60px;
            padding: 12px 30px;
            margin: 15px 0 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .control-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #4ecdc4;
        }
        .control-title i {
            font-size: 1.5rem;
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
            justify-content: center;
        }

        .ctrl-btn i {
            font-size: 1.2rem;
        }

        .ctrl-btn.maju.active {
            background: #4ecdc4;
            color: #0a1f2e;
            border-color: #4ecdc4;
        }

        .ctrl-btn.mundur.active {
            background: #b980f0;
            color: #0a1f2e;
            border-color: #b980f0;
        }

        .ctrl-btn.start.active {
            background: #4ecdc4;
            color: #0a1f2e;
            border-color: #4ecdc4;
        }

        .ctrl-btn.stop.active {
            background: #ff5252;
            color: white;
            border-color: #ff5252;
        }

        .motor-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .motor-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ecdc4;
            box-shadow: 0 0 10px #4ecdc4;
        }
        .motor-led.stop {
            background: #ff5252;
            box-shadow: 0 0 10px #ff5252;
        }

        /* Footer */
        .dashboard-footer {
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 10px 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timestamp {
            color: #a8dadc;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timestamp i {
            color: #4ecdc4;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4ecdc4;
        }

        .connection-status i {
            font-size: 0.8rem;
        }

        /* Toast notifikasi */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            border-left: 4px solid #4ecdc4;
            z-index: 1000;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }

        /* Responsif */
        @media (max-width: 900px) {
            .value-number { font-size: 4rem; }
            .control-panel { flex-direction: column; gap: 15px; }
            .control-buttons { justify-content: center; }
        }

        @media (max-width: 700px) {
            .dashboard-header { flex-direction: column; gap: 15px; border-radius: 30px; }
            .cards-grid { grid-template-columns: 1fr; gap: 15px; }
            .value-number { font-size: 3.2rem; }
        }
    </style>
</head>
<body>
    <!-- Efek gelembung -->
    <div class="bubble" style="width: 150px; height: 150px; top: 10%; left: 5%;"></div>
    <div class="bubble" style="width: 200px; height: 200px; bottom: 5%; right: 2%; animation-delay: 3s;"></div>
    <div class="bubble" style="width: 100px; height: 100px; top: 20%; right: 15%; animation-delay: 1.5s;"></div>

    <!-- Container utama -->
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="header-left">
                <i class="fas fa-robot"></i>
                <h1>AquaSense <span>Drone Bawah Air</span></h1>
            </div>
            <div class="user-section">
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i>
                    <span id="usernameDisplay">Admin</span>
                </div>
                <div class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Keluar</span>
                </div>
            </div>
        </div>

        <!-- Grid Kartu Data -->
        <div class="cards-grid">
            <!-- Kartu TDS -->
            <div class="card card-tds">
                <div class="card-header">
                    <i class="fas fa-flask"></i>
                    <h2>TDS</h2>
                </div>
                <div class="main-value">
                    <span class="value-number" id="tdsValue">78</span>
                    <span class="value-unit">ppm</span>
                </div>
                <div class="value-label">Total Dissolved Solids</div>
                <div class="card-footer">
                    <span><i class="fas fa-chart-line"></i> Padatan terlarut</span>
                    <span class="status-badge" id="tdsStatus">Normal</span>
                </div>
            </div>

            <!-- Kartu EC -->
            <div class="card card-ec">
                <div class="card-header">
                    <i class="fas fa-bolt"></i>
                    <h2>EC</h2>
                </div>
                <div class="main-value">
                    <span class="value-number" id="ecValue">0.24</span>
                    <span class="value-unit">µS/cm</span>
                </div>
                <div class="value-label">Electrical Conductivity</div>
                <div class="card-footer">
                    <span><i class="fas fa-chart-line"></i> Konduktivitas</span>
                    <span class="status-badge" id="ecStatus">Normal</span>
                </div>
            </div>

            <!-- Kartu Temperature -->
            <div class="card card-temp">
                <div class="card-header">
                    <i class="fas fa-thermometer-half"></i>
                    <h2>Suhu</h2>
                </div>
                <div class="main-value">
                    <span class="value-number" id="tempValue">27.69</span>
                    <span class="value-unit">°C</span>
                </div>
                <div class="value-label">Temperature</div>
                <div class="card-footer">
                    <span><i class="fas fa-chart-line"></i> Suhu air</span>
                    <span class="status-badge" id="tempStatus">Normal</span>
                </div>
            </div>
        </div>

        <!-- PANEL KONTROL DRONE -->
        <div class="control-panel">
            <div class="control-title">
                <i class="fas fa-gamepad"></i>
                <span>KONTROL DRONE</span>
            </div>
            <div class="control-buttons">
                <!-- Tombol Arah -->
                <button class="ctrl-btn maju" id="btnMaju">
                    <i class="fas fa-arrow-up"></i> Maju
                </button>
                <button class="ctrl-btn mundur" id="btnMundur">
                    <i class="fas fa-arrow-down"></i> Mundur
                </button>
                <!-- Tombol Start/Stop -->
                <button class="ctrl-btn start" id="btnStart">
                    <i class="fas fa-play"></i> Start
                </button>
                <button class="ctrl-btn stop" id="btnStop">
                    <i class="fas fa-stop"></i> Stop
                </button>
            </div>
            <div class="motor-status">
                <span class="motor-led" id="motorLed"></span>
                <span id="motorStatusText">Stop</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="dashboard-footer">
            <div class="timestamp">
                <i class="far fa-clock"></i>
                <span id="lastUpdate">Memuat...</span>
            </div>
            <div class="connection-status online">
                <i class="fas fa-circle"></i>
                <span>Drone Terhubung</span>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onValue, set, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // ============= CEK SESSION LOGIN =============
        function checkLogin() {
            const loggedIn = localStorage.getItem('aqua_logged_in') || sessionStorage.getItem('aqua_logged_in');
            const username = localStorage.getItem('aqua_user') || sessionStorage.getItem('aqua_user');
            
            if (loggedIn !== 'true') {
                window.location.href = 'index.html';
                return false;
            }
            
            if (username) {
                document.getElementById('usernameDisplay').textContent = username;
            }
            return true;
        }

        if (!checkLogin()) {
            throw new Error('Not logged in');
        }

        // ============= KONFIGURASI FIREBASE =============
        const firebaseConfig = {
            apiKey: "AIzaSyCOyb6c8I4CMYQSx8rrYPNlb766pyQrJ-E",
            authDomain: "aqua-drone-monitor.firebaseapp.com",
            databaseURL: "https://aqua-drone-monitor-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aqua-drone-monitor",
            storageBucket: "aqua-drone-monitor.firebasestorage.app",
            messagingSenderId: "605767402508",
            appId: "1:605767402508:web:8bef2ce2992a3d26f69a29"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        // Referensi ke database - SESUAI STRUKTUR ANDA: drone/control
        const droneRef = ref(database, 'drone');
        const controlRef = ref(database, 'drone/control'); // <-- INI YANG BENAR!

        // Fungsi untuk menampilkan notifikasi
        function showToast(message, isError = false) {
            const oldToast = document.querySelector('.toast-message');
            if (oldToast) oldToast.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.style.borderLeftColor = isError ? '#ff5252' : '#4ecdc4';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // Update tampilan dashboard
        function updateDashboard(data) {
            if (!data) return;
            
            // Update nilai sensor
            document.getElementById('tdsValue').textContent = data.tds?.toFixed(2) || '78';
            document.getElementById('ecValue').textContent = data.ec?.toFixed(2) || '0.24';
            document.getElementById('tempValue').textContent = data.suhu?.toFixed(2) || '27.69';
            
            // Update status
            const tds = data.tds || 78;
            const ec = data.ec || 0.24;
            const suhu = data.suhu || 27.69;
            
            updateStatus('tds', tds, 500, 1000);
            updateStatus('ec', ec, 1.5, 2.5);
            updateStatus('temp', suhu, 30, 35);
            
            // Update timestamp
            const timestamp = data.timestamp || Date.now();
            const date = new Date(timestamp);
            document.getElementById('lastUpdate').textContent = 
                date.toLocaleString('id-ID', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: '2-digit',
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit'
                });
        }

        function updateStatus(param, value, batasNormal, batasWaspada) {
            const statusEl = document.getElementById(`${param}Status`);
            if (!statusEl) return;
            
            if (value <= batasNormal) {
                statusEl.textContent = 'Normal';
                statusEl.style.background = 'rgba(78, 205, 196, 0.3)';
                statusEl.style.border = '1px solid rgba(78, 205, 196, 0.5)';
            } else if (value <= batasWaspada) {
                statusEl.textContent = 'Waspada';
                statusEl.style.background = 'rgba(255, 193, 7, 0.3)';
                statusEl.style.border = '1px solid rgba(255, 193, 7, 0.5)';
            } else {
                statusEl.textContent = 'Bahaya';
                statusEl.style.background = 'rgba(255, 82, 82, 0.3)';
                statusEl.style.border = '1px solid rgba(255, 82, 82, 0.5)';
            }
        }

        // Update tampilan status motor
        function updateMotorStatus(controlData) {
            if (!controlData) return;
            
            const motorLed = document.getElementById('motorLed');
            const motorText = document.getElementById('motorStatusText');
            
            const arah = controlData.arah || 'MAJU';
            const start = controlData.start || false;
            
            // Update LED dan teks
            if (start) {
                motorLed.className = 'motor-led';
                motorText.textContent = `Start • ${arah}`;
            } else {
                motorLed.className = 'motor-led stop';
                motorText.textContent = 'Stop';
            }

            // Update class active pada tombol
            document.getElementById('btnMaju').classList.remove('active');
            document.getElementById('btnMundur').classList.remove('active');
            document.getElementById('btnStart').classList.remove('active');
            document.getElementById('btnStop').classList.remove('active');
            
            if (arah === 'MAJU') document.getElementById('btnMaju').classList.add('active');
            if (arah === 'MUNDUR') document.getElementById('btnMundur').classList.add('active');
            if (start) document.getElementById('btnStart').classList.add('active');
            else document.getElementById('btnStop').classList.add('active');
        }

        // ============= LISTENER FIREBASE =============
        
        // Listener untuk data drone (semua data termasuk sensor dan control)
        onValue(droneRef, (snapshot) => {
            const data = snapshot.val();
            console.log("Data lengkap dari Firebase:", data);
            
            if (data) {
                // Update nilai sensor
                updateDashboard(data);
                
                // Update status kontrol jika ada
                if (data.control) {
                    updateMotorStatus(data.control);
                }
                
                document.querySelector('.connection-status').innerHTML = '<i class="fas fa-circle"></i><span>Drone Terhubung</span>';
                document.querySelector('.connection-status').style.color = '#4ecdc4';
            }
        }, (error) => {
            console.error("Error drone:", error);
            document.querySelector('.connection-status').innerHTML = '<i class="fas fa-exclamation-triangle"></i><span>Koneksi Terputus</span>';
            document.querySelector('.connection-status').style.color = '#ff6b6b';
        });

        // ============= FUNGSI UNTUK MENGUBAH DATA DI FIREBASE =============
        
        // Fungsi untuk mengubah nilai start di Firebase (di dalam drone/control)
        async function setStart(value) {
            try {
                console.log(`Mengubah start menjadi: ${value} di drone/control`);
                
                // Update hanya field start di dalam drone/control
                await update(ref(database, 'drone/control'), {
                    start: value
                });
                
                console.log("✓ Start berhasil diubah menjadi:", value);
                showToast(`Start: ${value ? 'ON' : 'OFF'}`);
                
            } catch (error) {
                console.error("Error:", error);
                showToast("Gagal mengubah start!", true);
            }
        }

        // Fungsi untuk mengubah arah di Firebase (di dalam drone/control)
        async function setArah(value) {
            try {
                console.log(`Mengubah arah menjadi: ${value} di drone/control`);
                
                // Update hanya field arah di dalam drone/control
                await update(ref(database, 'drone/control'), {
                    arah: value
                });
                
                console.log("✓ Arah berhasil diubah menjadi:", value);
                showToast(`Arah: ${value}`);
                
            } catch (error) {
                console.error("Error:", error);
                showToast("Gagal mengubah arah!", true);
            }
        }

        // ============= EVENT LISTENER TOMBOL =============
        
        document.getElementById('btnStart').addEventListener('click', () => {
            setStart(true);
        });

        document.getElementById('btnStop').addEventListener('click', () => {
            setStart(false);
        });

        document.getElementById('btnMaju').addEventListener('click', () => {
            setArah('MAJU');
        });

        document.getElementById('btnMundur').addEventListener('click', () => {
            setArah('MUNDUR');
        });

        // Inisialisasi: buat struktur drone/control jika belum ada
        (async function initControl() {
            try {
                const snapshot = await new Promise((resolve) => {
                    onValue(ref(database, 'drone'), resolve, { onlyOnce: true });
                });
                
                const data = snapshot.val();
                
                if (!data || !data.control) {
                    console.log("Membuat struktur drone/control default...");
                    
                    // Buat struktur lengkap
                    await set(ref(database, 'drone'), {
                        ...data,
                        control: {
                            arah: 'MAJU',
                            start: false
                        }
                    });
                    
                    console.log("Struktur drone/control berhasil dibuat");
                }
            } catch (error) {
                console.error("Error inisialisasi:", error);
            }
        })();

    </script>

    <!-- Script logout -->
    <script>
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('aqua_logged_in');
            localStorage.removeItem('aqua_user');
            sessionStorage.removeItem('aqua_logged_in');
            sessionStorage.removeItem('aqua_user');
            window.location.href = 'index.html';
        });

        function adjustFontSize() {
            const width = window.innerWidth;
            const numbers = document.querySelectorAll('.value-number');
            
            if (width < 700) {
                numbers.forEach(el => el.style.fontSize = '3rem');
            } else if (width < 900) {
                numbers.forEach(el => el.style.fontSize = '4rem');
            } else {
                numbers.forEach(el => el.style.fontSize = '5rem');
            }
        }
        window.addEventListener('load', adjustFontSize);
        window.addEventListener('resize', adjustFontSize);
    </script>
</body>
