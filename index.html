<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSense · Login Drone Bawah Air</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a1f2e 0%, #0b2b3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Efek gelembung air */
        .bubble {
            position: absolute;
            background: rgba(78, 205, 196, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* Container login */
        .login-container {
            width: 100%;
            max-width: 450px;
            z-index: 10;
        }

        /* Kartu login */
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Logo dan judul */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .login-header .logo {
            font-size: 4rem;
            color: #4ecdc4;
            margin-bottom: 15px;
            display: inline-block;
            background: rgba(78, 205, 196, 0.2);
            padding: 20px;
            border-radius: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .login-header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header p {
            color: #a8dadc;
            font-size: 1rem;
        }

        /* Form login */
        .login-form {
            position: relative;
            z-index: 10;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #a8dadc;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #4ecdc4;
            font-size: 1.2rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #4ecdc4;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Toggle password */
        .toggle-password {
            position: absolute;
            right: 15px;
            color: #a8dadc;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #4ecdc4;
        }


        /* Tombol login */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4ecdc4, #2a9d8f);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn i {
            margin-right: 10px;
            transition: transform 0.3s;
        }

        .login-btn:hover i {
            transform: translateX(5px);
        }

        /* Demo credentials */
        /* .demo-credentials {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        } */

        /* .demo-credentials p {
            color: #a8dadc;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-align: center;
        } */

        /* .cred-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
        } */

        /* .cred-box span {
            color: #4ecdc4;
        }

        .cred-box i {
            color: #ffd93d;
            margin-right: 8px;
        } */

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(78, 205, 196, 0.3);
            border-top: 5px solid #4ecdc4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: white;
            font-size: 1.2rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            background: rgba(255, 82, 82, 0.2);
            border: 1px solid #ff5252;
            color: #ff5252;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .error-message i {
            font-size: 1.2rem;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: #a8dadc;
            font-size: 0.85rem;
        }

        .login-footer a {
            color: #4ecdc4;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 1.8rem;
            }

            .login-options {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- Efek gelembung -->
    <div class="bubble" style="width: 100px; height: 100px; top: 10%; left: 5%;"></div>
    <div class="bubble" style="width: 150px; height: 150px; bottom: 15%; right: 8%; animation-delay: 2s;"></div>
    <div class="bubble" style="width: 70px; height: 70px; top: 30%; right: 20%; animation-delay: 4s;"></div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Menghubungkan ke dashboard...</div>
    </div>

    <!-- Container login -->
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                </div>
                <h1>AquaSense</h1>
                <p>Drone Bawah Air · Monitoring Kualitas Air</p>
            </div>

            <!-- Error message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- Form login -->
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Username / Email
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Masukkan username"
                            value="admin"
                            required
                        >
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Masukkan password"
                            value="drone123"
                            required
                        >
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Ingat saya</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="alert('Hubungi admin untuk reset password')">
                        Lupa password?
                    </a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Masuk ke Dashboard
                </button>
            </form>

            <!-- Demo credentials
            <div class="demo-credentials">
                <p><i class="fas fa-info-circle"></i> Akun demo (klik untuk isi otomatis)</p>
                <div class="cred-box" onclick="fillDemoCredentials()" style="cursor: pointer;">
                    <div><i class="fas fa-user"></i> <span>Username:</span> admin</div>
                    <div><i class="fas fa-lock"></i> <span>Password:</span> drone123</div>
                </div>
                <p style="margin-top: 10px; font-size:0.8rem;">
                    <i class="fas fa-clock"></i> Klik kotak di atas untuk isi otomatis
                </p>
            </div> -->

            <div class="login-footer">
                <p>© 2026 AquaSense · v1.0</p>
                <p style="margin-top: 5px;">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#" style="margin-left: 10px;"><i class="fab fa-facebook"></i></a>
                    <a href="#" style="margin-left: 10px;"><i class="fab fa-twitter"></i></a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Toggle show/hide password
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Fungsi untuk mengisi demo credentials
        // function fillDemoCredentials() {
        //     document.getElementById('username').value = 'admin';
        //     document.getElementById('password').value = 'drone123';
        //     // Efek highlight
        //     document.querySelector('.demo-credentials .cred-box').style.background = 'rgba(78, 205, 196, 0.3)';
        //     setTimeout(() => {
        //         document.querySelector('.demo-credentials .cred-box').style.background = 'rgba(0, 0, 0, 0.2)';
        //     }, 300);
        // }

        // Data user valid (dalam production, ini harus di server)
        const validUsers = [
            { username: 'admin', password: 'drone123' },
            { username: 'operator', password: 'aqua2026' },
            { username: 'pemantau', password: 'bawahair' }
        ];

        // Handle form submit
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Ambil nilai input
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Validasi input kosong
            if (!username || !password) {
                showError('Username dan password tidak boleh kosong!');
                return;
            }

            // Cek kredensial
            const userValid = validUsers.find(user => 
                user.username === username && user.password === password
            );

            if (userValid) {
                // Login berhasil
                loginSuccess(username, rememberMe);
            } else {
                // Login gagal
                showError('Username atau password salah!');
                
                // Efek shake pada form
                document.querySelector('.login-card').style.animation = 'shake 0.5s';
                setTimeout(() => {
                    document.querySelector('.login-card').style.animation = '';
                }, 500);
            }
        });

        // Fungsi show error
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.style.display = 'flex';
            
            // Auto hide setelah 3 detik
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        // Fungsi login success
        function loginSuccess(username, rememberMe) {
            // Tampilkan loading
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            // Simpan session jika remember me dicentang
            if (rememberMe) {
                localStorage.setItem('aqua_user', username);
                localStorage.setItem('aqua_logged_in', 'true');
            } else {
                sessionStorage.setItem('aqua_user', username);
                sessionStorage.setItem('aqua_logged_in', 'true');
            }

            // Simulasi proses login (koneksi ke dashboard)
            setTimeout(() => {
                // Redirect ke dashboard (ganti dengan URL dashboard Anda)
                // Dalam contoh ini, kita buka dashboard di tab baru
                window.location.href = 'dashboard.html'; 
                // Jika dashboard dalam file terpisah, pastikan nama filenya sesuai
                
                // Atau jika dashboard dalam satu file, bisa pindah section
                // document.body.innerHTML = dashboardHTML;
            }, 2000);
        }

        // Cek apakah sudah login sebelumnya
        window.addEventListener('load', function() {
            const loggedIn = localStorage.getItem('aqua_logged_in') || sessionStorage.getItem('aqua_logged_in');
            if (loggedIn === 'true') {
                // Auto redirect ke dashboard
                window.location.href = 'dashboard.html';
            }
        });

        // Efek gelembung random
        function createBubbles() {
            const colors = ['rgba(78, 205, 196, 0.1)', 'rgba(168, 218, 220, 0.1)', 'rgba(255, 255, 255, 0.05)'];
            for (let i = 0; i < 10; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 100 + 30;
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.top = Math.random() * 100 + '%';
                bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                bubble.style.animationDuration = (Math.random() * 10 + 5) + 's';
                bubble.style.animationDelay = (Math.random() * 5) + 's';
                document.body.appendChild(bubble);
            }
        }
        createBubbles();

        // Animasi shake untuk error
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
